name: android-bridge

on:
  workflow_dispatch:
    inputs:
      upload_to_release_tag:
        description: "Optional. Published release tag to attach the APK to (e.g. v1.0.0-beta.2). Leave empty to build only and download the Actions artifact."
        required: false
        type: string
        default: ""
  release:
    types:
      - published
  push:
    branches:
      - main
    paths:
      - "Android Bridge App/PolarH10Bridge/**"
      - ".github/workflows/android-bridge.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Android Bridge App/PolarH10Bridge/**"
      - ".github/workflows/android-bridge.yml"

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android Bridge App/PolarH10Bridge

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: PolarH10Bridge-debug-apk
          path: Android Bridge App/PolarH10Bridge/app/build/outputs/apk/debug/app-debug.apk

  upload-to-release:
    needs: build-debug-apk
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve release tag
        id: release_tag
        env:
          MANUAL_TAG: ${{ github.event.inputs.upload_to_release_tag }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            T="${{ github.ref_name }}"
          else
            T=$(printf '%s' "$MANUAL_TAG" | tr -d '\r' | xargs)
          fi
          if [ -z "$T" ]; then
            echo "::error::Release tag is empty."
            exit 1
          fi
          echo "tag=$T" >> "$GITHUB_OUTPUT"

      - name: Download debug APK artifact
        uses: actions/download-artifact@v7
        with:
          name: PolarH10Bridge-debug-apk
          path: apk

      # GitHub's release API can lag slightly behind the `release: published` event;
      # Gradle also finishes after the desktop matrix uploads. Retry so `gh release view`
      # sees the same published release the desktop workflow attached to.
      - name: Attach APK to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release_tag.outputs.tag }}"
          test -f apk/app-debug.apk
          cp apk/app-debug.apk "PolarH10Bridge-debug-${TAG}.apk"
          FILE="PolarH10Bridge-debug-${TAG}.apk"
          found=
          for i in $(seq 1 30); do
            if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
              found=1
              break
            fi
            echo "Release not visible yet for tag '$TAG' (attempt $i/30); waiting 10s..."
            sleep 10
          done
          if [ -z "$found" ]; then
            echo "::error::No published GitHub release found for tag '$TAG' after waiting."
            echo "Recent releases (check tag spelling, including leading 'v'):"
            gh release list -L 15 || true
            exit 1
          fi
          gh release upload "$TAG" "$FILE" --clobber
