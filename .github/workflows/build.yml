name: build

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: Hertz-and-Hearts-linux-x64
            artifact_path: dist/Hertz-and-Hearts
          - os: windows-2022
            artifact_name: Hertz-and-Hearts-windows-x64
            artifact_path: dist/Hertz-and-Hearts
          - os: macos-14
            artifact_name: Hertz-and-Hearts-macos
            artifact_path: dist/Hertz-and-Hearts.app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[build]

      - name: Compute release version label
        id: version
        shell: bash
        run: |
          V="$(python - <<'PY'
          import re, tomllib
          v = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          m = re.fullmatch(r"(\d+\.\d+\.\d+)b(\d+)", v)
          if m:
              n = int(m.group(2))
              print(f"{m.group(1)}-beta" if n == 0 else f"{m.group(1)}-beta.{n}")
          else:
              print(v)
          PY
          )"
          echo "label=$V" >> "$GITHUB_OUTPUT"

      - name: Build app bundle (all platforms)
        run: |
          pyinstaller Hertz-and-Hearts.spec --clean --noconfirm

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          PACKAGE_NAME="Hertz-and-Hearts-${{ steps.version.outputs.label }}-linux-x64.tar.gz"
          tar -C dist -czf "dist/${PACKAGE_NAME}" Hertz-and-Hearts
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "$GITHUB_ENV"

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          PACKAGE_NAME="Hertz-and-Hearts-${{ steps.version.outputs.label }}-macos.zip"
          ditto -c -k --sequesterRsrc --keepParent dist/Hertz-and-Hearts.app "dist/${PACKAGE_NAME}"
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "$GITHUB_ENV"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageName = "Hertz-and-Hearts-${{ steps.version.outputs.label }}-windows-x64.zip"
          Compress-Archive -Path "dist/Hertz-and-Hearts/*" -DestinationPath "dist/$packageName" -Force
          Add-Content -Path $env:GITHUB_ENV -Value "PACKAGE_NAME=$packageName"

      - name: Build Windows installer (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $ver = python -c 'import re, tomllib; v = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]; m = re.fullmatch(r"(\d+\.\d+\.\d+)b(\d+)", v); print(f"{m.group(1)}-beta" if m and m.group(2) == "0" else f"{m.group(1)}-beta.{m.group(2)}" if m else v)'
          iscc "/DMyAppVersion=$ver" installer.iss

      # Upload the built tree, not a pre-made .zip/.tar.gz: GitHub always zips
      # artifacts, so uploading e.g. *.zip yields a zip inside the download zip.
      - name: Upload platform artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.version.outputs.label }}
          path: ${{ matrix.artifact_path }}

      - name: Upload Windows setup artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: Hertz-and-Hearts-Windows-Setup-${{ steps.version.outputs.label }}
          path: installer_output/*.exe

      - name: Upload artifacts to GitHub release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" "dist/${PACKAGE_NAME}" --clobber
          if [ "${{ runner.os }}" = "Windows" ]; then
            gh release upload "${{ github.ref_name }}" installer_output/*.exe --clobber
          fi
