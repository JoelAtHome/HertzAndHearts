name: build

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:

  build:

    runs-on: ubuntu-24.04

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
          python-version: "3.12"

    - name: Install dependencies
      run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[build]

    - name: release build
      if: github.event_name == 'release'
      run: |
        pyinstaller --onefile --icon=docs/logo.ico --name=Hertz-and-Hearts.bin hnh/app.py --windowed

    - name: manual build
      if: github.event_name == 'workflow_dispatch'
      run: |
        pyinstaller --onefile --icon=docs/logo.ico --name=Hertz-and-Hearts.bin hnh/app.py

    - name: upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hertz-and-Hearts
        path: dist/Hertz-and-Hearts.bin

    - name: upload build artifact to release
      if: github.event_name == 'release'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ github.ref_name }} dist/Hertz-and-Hearts.bin
