name: kiosk-iso

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-kiosk-iso:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install kiosk ISO build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y live-build xorriso squashfs-tools syslinux syslinux-utils isolinux fdisk wget curl git rsync
          if ! command -v isohybrid >/dev/null 2>&1; then
            if command -v isohybrid.pl >/dev/null 2>&1; then
              sudo ln -sf "$(command -v isohybrid.pl)" /usr/bin/isohybrid
            else
              # Some environments omit isohybrid even with syslinux-utils.
              # Provide a harmless shim so live-build does not hard-fail at binary.sh.
              printf '%s\n' '#!/usr/bin/env bash' 'set -euo pipefail' 'echo "[kiosk-iso] WARN: isohybrid binary unavailable; skipping legacy post-process." >&2' 'exit 0' | sudo tee /usr/bin/isohybrid >/dev/null
              sudo chmod +x /usr/bin/isohybrid
            fi
          fi
          if ! command -v isohybrid >/dev/null 2>&1; then
            CANDIDATE="$(sudo sh -c \"command -v isohybrid.pl 2>/dev/null || true\")"
            if [ -n "${CANDIDATE}" ]; then
              sudo ln -sf "${CANDIDATE}" /usr/bin/isohybrid
            fi
          fi
          command -v isohybrid >/dev/null 2>&1 || { echo "isohybrid not found after dependency install"; exit 4; }

      - name: Configure live-build
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/hnh-kiosk-build"
          cd "${RUNNER_TEMP}/hnh-kiosk-build"
          mkdir -p _failure_logs
          sudo lb clean --purge || true
          lb config \
            --mode ubuntu \
            --distribution noble \
            --architectures amd64 \
            --binary-images "iso-hybrid" \
            --bootloader grub-efi \
            --archive-areas "main restricted universe multiverse" \
            --apt-source-archives false \
            --source false \
            --mirror-bootstrap https://archive.ubuntu.com/ubuntu \
            --mirror-binary https://archive.ubuntu.com/ubuntu \
            --mirror-chroot-security https://security.ubuntu.com/ubuntu \
            --debian-installer false \
            --apt-options "--yes -o Acquire::Retries=20 -o Acquire::By-Hash=yes -o Acquire::Languages=none -o Acquire::http::Timeout=90 -o Acquire::https::Timeout=90 -o Acquire::http::No-Cache=true -o Acquire::https::No-Cache=true" \
            2>&1 | tee _failure_logs/lb-config.log
          # Some live-build versions still enter lb_source despite --source false.
          # Force-disable source image generation in config file as a hard override.
          printf '%s\n' 'LB_SOURCE="false"' 'LB_SOURCE_IMAGES="none"' >> config/source

          # Apply kiosk customization overlay (autostart + writable path prep).
          if [ -d "${GITHUB_WORKSPACE}/kiosk/live-build" ]; then
            rsync -a "${GITHUB_WORKSPACE}/kiosk/live-build/" config/
            chmod +x config/hooks/normal/*.hook.chroot || true
            chmod +x config/includes.chroot/usr/local/bin/*.sh || true
          fi
      - name: Build ISO (retry once on transient mirror issues)
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/hnh-kiosk-build"
          build_once() {
            sudo lb bootstrap 2>&1 | tee _failure_logs/lb-bootstrap.log
            sudo lb chroot 2>&1 | tee _failure_logs/lb-chroot.log
            sudo lb binary 2>&1 | tee _failure_logs/lb-build.log
          }
          if ! build_once; then
            echo "First build attempt failed; cleaning and retrying once..."
            sudo lb clean --purge || true
            lb config \
              --mode ubuntu \
              --distribution noble \
              --architectures amd64 \
              --binary-images "iso-hybrid" \
              --bootloader grub-efi \
              --archive-areas "main restricted universe multiverse" \
              --apt-source-archives false \
              --source false \
              --mirror-bootstrap https://archive.ubuntu.com/ubuntu \
              --mirror-binary https://archive.ubuntu.com/ubuntu \
              --mirror-chroot-security https://security.ubuntu.com/ubuntu \
              --debian-installer false \
              --apt-options "--yes -o Acquire::Retries=20 -o Acquire::By-Hash=yes -o Acquire::Languages=none -o Acquire::http::Timeout=90 -o Acquire::https::Timeout=90 -o Acquire::http::No-Cache=true -o Acquire::https::No-Cache=true" \
              2>&1 | tee _failure_logs/lb-config-retry.log
            # Keep source generation disabled across retry path as well.
            printf '%s\n' 'LB_SOURCE="false"' 'LB_SOURCE_IMAGES="none"' >> config/source
            if [ -d "${GITHUB_WORKSPACE}/kiosk/live-build" ]; then
              rsync -a "${GITHUB_WORKSPACE}/kiosk/live-build/" config/
              chmod +x config/hooks/normal/*.hook.chroot || true
              chmod +x config/includes.chroot/usr/local/bin/*.sh || true
            fi
            sudo lb bootstrap 2>&1 | tee _failure_logs/lb-bootstrap-retry.log
            sudo lb chroot 2>&1 | tee _failure_logs/lb-chroot-retry.log
            sudo lb binary 2>&1 | tee _failure_logs/lb-build-retry.log
          fi

      - name: Capture build logs on failure
        if: failure()
        run: |
          cd "${RUNNER_TEMP}/hnh-kiosk-build" || exit 0
          mkdir -p _failure_logs
          cp -f *.log _failure_logs/ 2>/dev/null || true
          cp -f dist/* _failure_logs/ 2>/dev/null || true
          cp -f config/* _failure_logs/ 2>/dev/null || true
          cp -f auto/* _failure_logs/ 2>/dev/null || true

      - name: Stage ISO output
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/hnh-kiosk-build"
          pwd > _failure_logs/stage-cwd.txt
          ls -la > _failure_logs/stage-ls-root.txt
          ls -la .build > _failure_logs/stage-ls-dotbuild.txt 2>/dev/null || true
          ls -la binary > _failure_logs/stage-ls-binary-dir.txt 2>/dev/null || true
          find . -maxdepth 5 -type f > _failure_logs/stage-files-maxdepth5.txt 2>/dev/null || true
          # Prefer final live-build outputs; avoid intermediate chroot artifacts.
          ISO_PATH=""
          for CANDIDATE in "./binary.iso" "./live-image-amd64.iso" "./binary.hybrid.iso" "./live-image-amd64.hybrid.iso" "./.build/binary.iso" "./.build/live-image-amd64.iso" "./.build/binary.hybrid.iso" "./.build/live-image-amd64.hybrid.iso"; do
            if [ -f "${CANDIDATE}" ]; then
              ISO_PATH="${CANDIDATE}"
              break
            fi
          done
          if [ -z "${ISO_PATH}" ]; then
            ISO_PATH="$(find . -maxdepth 5 -type f -name "*.iso" -not -path "./chroot/*" -print -quit 2>/dev/null || true)"
          fi
          IMG_PATH=""
          for CANDIDATE in "./binary.img" "./live-image-amd64.img" "./.build/binary.img" "./.build/live-image-amd64.img"; do
            if [ -f "${CANDIDATE}" ]; then
              IMG_PATH="${CANDIDATE}"
              break
            fi
          done
          if [ -z "${IMG_PATH}" ]; then
            IMG_PATH="$(find . -maxdepth 5 -type f -name "*.img" -not -path "./chroot/*" -print -quit 2>/dev/null || true)"
          fi
          find . -maxdepth 5 -type f -name "*.iso" -print > _failure_logs/iso-paths.txt 2>/dev/null || true
          if [ -z "${ISO_PATH}" ]; then
            echo "No ISO produced by live-build. Failing build to avoid shipping IMG-only artifacts." >&2
            exit 2
          fi
          mkdir -p dist
          if [ -n "${ISO_PATH}" ]; then
            ls -lh "${ISO_PATH}"
            cp -f "${ISO_PATH}" dist/hnh-kiosk-base.iso
            if command -v xorriso >/dev/null 2>&1; then
              if xorriso -indev dist/hnh-kiosk-base.iso -outdev dist/hnh-kiosk-base.usb.iso -boot_image any replay -boot_image any partition_table=on; then
                mv -f dist/hnh-kiosk-base.usb.iso dist/hnh-kiosk-base.iso
              else
                echo "WARN: xorriso replay could not add partition table metadata." >&2
                rm -f dist/hnh-kiosk-base.usb.iso
              fi
            fi
            file dist/hnh-kiosk-base.iso | tee dist/hnh-kiosk-base.iso.file.txt
            if command -v fdisk >/dev/null 2>&1; then
              fdisk -l dist/hnh-kiosk-base.iso | tee dist/hnh-kiosk-base.iso.fdisk.txt
            else
              echo "fdisk not available on runner." | tee dist/hnh-kiosk-base.iso.fdisk.txt
            fi
            if ! awk '/Disklabel type/ {found=1} END {exit found?0:1}' dist/hnh-kiosk-base.iso.fdisk.txt; then
              echo "WARN: ISO lacks partition table metadata; USB boot compatibility may vary by firmware." >&2
            fi
            (cd dist && sha256sum hnh-kiosk-base.iso > hnh-kiosk-base.iso.sha256)
          fi
          if [ -n "${IMG_PATH}" ]; then
            ls -lh "${IMG_PATH}"
            cp -f "${IMG_PATH}" dist/hnh-kiosk-base.img
            file dist/hnh-kiosk-base.img | tee dist/hnh-kiosk-base.img.file.txt
            if command -v fdisk >/dev/null 2>&1; then
              fdisk -l dist/hnh-kiosk-base.img | tee dist/hnh-kiosk-base.img.fdisk.txt
            else
              echo "fdisk not available on runner." | tee dist/hnh-kiosk-base.img.fdisk.txt
            fi
            (cd dist && sha256sum hnh-kiosk-base.img > hnh-kiosk-base.img.sha256)
          fi

      - name: Upload ISO artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hnh-kiosk-artifacts
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/hnh-kiosk-build/dist/hnh-kiosk-base.iso
            ${{ runner.temp }}/hnh-kiosk-build/dist/hnh-kiosk-base.iso.sha256
            ${{ runner.temp }}/hnh-kiosk-build/dist/hnh-kiosk-base.iso.file.txt
            ${{ runner.temp }}/hnh-kiosk-build/dist/hnh-kiosk-base.iso.fdisk.txt
            ${{ runner.temp }}/hnh-kiosk-build/dist/hnh-kiosk-base.img
            ${{ runner.temp }}/hnh-kiosk-build/dist/hnh-kiosk-base.img.sha256
            ${{ runner.temp }}/hnh-kiosk-build/dist/hnh-kiosk-base.img.file.txt
            ${{ runner.temp }}/hnh-kiosk-build/dist/hnh-kiosk-base.img.fdisk.txt

      - name: Upload failure logs artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hnh-kiosk-build-failure-logs
          path: ${{ runner.temp }}/hnh-kiosk-build/_failure_logs

      - name: Upload ISO to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${RUNNER_TEMP}/hnh-kiosk-build/dist/hnh-kiosk-base.iso" \
            "${RUNNER_TEMP}/hnh-kiosk-build/dist/hnh-kiosk-base.iso.sha256" \
            --clobber
