name: sanity

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Compile sanity check
        run: python -m compileall -q hnh

      - name: Run lightweight tests
        run: |
          python -m pytest -q \
            test/test_logger.py \
            test/test_profile_store.py \
            test/test_replay_loader.py
