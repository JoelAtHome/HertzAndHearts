name: Feature request
description: Suggest an idea or enhancement for Hertz & Hearts.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Clear problem statements help us prioritize effectively.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem are you trying to solve?
      placeholder: Describe the pain point or limitation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen?
      placeholder: Describe your suggested behavior or workflow.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Main monitoring dashboard
        - Session history / replay
        - Trends / compare / insights
        - Reports / export
        - Profiles / login / roles
        - Sensor connection / reliability
        - Settings / preferences
        - Other
    validations:
      required: true

  - type: input
    id: priority
    attributes:
      label: Suggested priority
      placeholder: e.g., nice-to-have, important, critical
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I focused this request on a user problem, not just an implementation detail.
          required: false
